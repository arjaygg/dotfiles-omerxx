# Hook enforcement: "block" (exit 1) or "off" (exit 0). No "warn" level.
# Hooks either block or they don't. Advisory messages use exit 0 + stdout.
#
# Consolidated 2026-04-01: 6 PreToolUse → 1 (pre-tool-gate-v2.sh), 4 PostToolUse → 1 (post-tool-analytics.sh)
# See plans/curious-zooming-moonbeam.md for architecture rationale.

# --- PreToolUse (pre-tool-gate-v2.sh) ---
# Individual concerns are sections within the consolidated script.
# These flags allow disabling specific checks without editing the script.
serena-tool-priority: block      # Serena hints for Grep/Glob/Read
bash-tool-gate: block            # grep/find/ls in Bash → dedicated tools
edit-without-read: block         # Edit files must be Read first

# --- Session lifecycle ---
duplicate-session-check: block   # block duplicate sessions; off to disable
session-duration-guard: block    # block at 500 turns; warn at 100+; off to disable

# --- Stop event ---
todo-gate: block                 # block incomplete todos on session end
drift-guard: off                 # off = disabled (re-enable when needed)
